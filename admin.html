<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ-панель Бота</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            padding: 16px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 24px;
        }

        .header h1 {
            font-size: 24px;
            margin-bottom: 8px;
        }

        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            border-bottom: 2px solid var(--tg-theme-secondary-bg-color, #f0f0f0);
        }

        .tab {
            padding: 12px 20px;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 16px;
            color: var(--tg-theme-hint-color, #999999);
            border-bottom: 2px solid transparent;
            margin-bottom: -2px;
        }

        .tab.active {
            color: var(--tg-theme-button-color, #3390ec);
            border-bottom-color: var(--tg-theme-button-color, #3390ec);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .card {
            background: var(--tg-theme-secondary-bg-color, #f0f0f0);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
        }

        .post-item {
            background: var(--tg-theme-bg-color, #ffffff);
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 8px;
        }

        .post-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .post-title {
            font-weight: 600;
            font-size: 16px;
        }

        .post-day {
            background: var(--tg-theme-button-color, #3390ec);
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
        }

        .post-content {
            font-size: 14px;
            color: var(--tg-theme-hint-color, #666666);
            margin-bottom: 12px;
            white-space: pre-wrap;
            max-height: 100px;
            overflow: hidden;
        }

        .post-actions {
            display: flex;
            gap: 8px;
        }

        .button {
            padding: 10px 16px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .button:active {
            opacity: 0.8;
        }

        .button.primary {
            background: var(--tg-theme-button-color, #3390ec);
            color: var(--tg-theme-button-text-color, #ffffff);
        }

        .button.success {
            background: #34c759;
            color: white;
        }

        .button.danger {
            background: #ff3b30;
            color: white;
        }

        .button.secondary {
            background: var(--tg-theme-secondary-bg-color, #f0f0f0);
            color: var(--tg-theme-text-color, #000000);
        }

        .button.full-width {
            width: 100%;
            padding: 14px;
            font-size: 16px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            font-size: 14px;
        }

        .form-input, .form-textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--tg-theme-secondary-bg-color, #f0f0f0);
            border-radius: 8px;
            font-size: 14px;
            background: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
        }

        .form-textarea {
            min-height: 150px;
            resize: vertical;
            font-family: inherit;
        }

        .file-input-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
            width: 100%;
        }

        .file-input-wrapper input[type=file] {
            position: absolute;
            left: -9999px;
        }

        .file-input-label {
            display: block;
            padding: 12px;
            background: var(--tg-theme-secondary-bg-color, #f0f0f0);
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
            font-size: 14px;
        }

        .preview-image {
            max-width: 100%;
            border-radius: 8px;
            margin-top: 8px;
        }

        .message {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 12px;
            font-size: 14px;
        }

        .message.success {
            background: #34c759;
            color: white;
        }

        .message.error {
            background: #ff3b30;
            color: white;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: var(--tg-theme-hint-color, #999999);
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--tg-theme-hint-color, #999999);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 Админ-панель</h1>
        </div>

        <div id="message"></div>

        <div class="tabs">
            <button class="tab active" onclick="switchTab('posts')">📝 Посты</button>
            <button class="tab" onclick="switchTab('add')">➕ Добавить</button>
            <button class="tab" onclick="switchTab('status')">📊 Статус</button>
        </div>

        <!-- Вкладка: Список постов -->
        <div id="posts-tab" class="tab-content active">
            <div id="postsList" class="loading">Загрузка постов...</div>
        </div>

        <!-- Вкладка: Добавить пост -->
        <div id="add-tab" class="tab-content">
            <div class="card">
                <h2 style="margin-bottom: 16px;">Новый пост</h2>
                <form id="addPostForm" onsubmit="addPost(event)">
                    <div class="form-group">
                        <label class="form-label">Заголовок</label>
                        <input type="text" class="form-input" name="title" required placeholder="Например: SaaS продукт">
                    </div>

                    <div class="form-group">
                        <label class="form-label">Содержание поста</label>
                        <textarea class="form-textarea" name="content" required placeholder="Текст поста..."></textarea>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Картинка</label>
                        <div class="file-input-wrapper">
                            <input type="file" id="imageInput" name="image" accept="image/*" onchange="previewImage(event)">
                            <label for="imageInput" class="file-input-label">📷 Выбрать картинку</label>
                        </div>
                        <img id="imagePreview" class="preview-image" style="display: none;">
                    </div>

                    <div class="form-group">
                        <label class="form-label">Или ключевые слова для Unsplash (если нет картинки)</label>
                        <input type="text" class="form-input" name="image_query" placeholder="business success money">
                    </div>

                    <button type="submit" class="button primary full-width">Добавить пост</button>
                </form>
            </div>
        </div>

        <!-- Вкладка: Статус -->
        <div id="status-tab" class="tab-content">
            <div class="card">
                <h2 style="margin-bottom: 12px;">📊 Статус</h2>
                <div style="padding: 8px; background: var(--tg-theme-bg-color, #ffffff); border-radius: 8px; margin-bottom: 8px;">
                    <div style="display: flex; justify-content: space-between;">
                        <span>Планировщик:</span>
                        <span style="font-weight: 600;">✅ Активен</span>
                    </div>
                </div>
                <div style="padding: 8px; background: var(--tg-theme-bg-color, #ffffff); border-radius: 8px;">
                    <div style="display: flex; justify-content: space-between;">
                        <span>Публикация:</span>
                        <span style="font-weight: 600;">Каждый день в 12:00 МСК</span>
                    </div>
                </div>
            </div>

            <button class="button success full-width" onclick="testPost()">🧪 Тестовый пост</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        // API URL - замени на адрес твоего VPS
        const API_URL = 'http://botirbz1.beget.tech:5000/api';

        let posts = [];

        function switchTab(tabName) {
            // Скрываем все вкладки
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));

            // Показываем нужную
            document.getElementById(`${tabName}-tab`).classList.add('active');
            event.target.classList.add('active');

            if (tabName === 'posts') {
                loadPosts();
            }
        }

        function showMessage(text, type = 'success') {
            const messageDiv = document.getElementById('message');
            messageDiv.innerHTML = `<div class="message ${type}">${text}</div>`;
            setTimeout(() => {
                messageDiv.innerHTML = '';
            }, 3000);
        }

        async function loadPosts() {
            try {
                const response = await fetch(`${API_URL}/posts`);
                const data = await response.json();
                posts = data.posts || [];

                const postsList = document.getElementById('postsList');

                if (posts.length === 0) {
                    postsList.innerHTML = '<div class="empty-state">Нет постов. Добавьте первый!</div>';
                    return;
                }

                postsList.innerHTML = posts.map(post => `
                    <div class="post-item">
                        <div class="post-header">
                            <div class="post-title">${post.title}</div>
                            <div class="post-day">День ${post.day}</div>
                        </div>
                        <div class="post-content">${post.content.substring(0, 150)}...</div>
                        <div class="post-actions">
                            <button class="button success" onclick="publishPost(${post.day})">📤 Опубликовать</button>
                            <button class="button danger" onclick="deletePost(${post.day})">🗑️ Удалить</button>
                        </div>
                    </div>
                `).join('');

                tg.HapticFeedback.notificationOccurred('success');
            } catch (error) {
                document.getElementById('postsList').innerHTML = '<div class="empty-state">Ошибка загрузки постов</div>';
                showMessage('Ошибка загрузки постов', 'error');
            }
        }

        function previewImage(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const preview = document.getElementById('imagePreview');
                    preview.src = e.target.result;
                    preview.style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        }

        async function addPost(event) {
            event.preventDefault();

            try {
                const formData = new FormData(event.target);

                const response = await fetch(`${API_URL}/posts`, {
                    method: 'POST',
                    body: formData
                });

                const result = await response.json();

                if (result.success) {
                    showMessage('✅ Пост успешно добавлен!', 'success');
                    event.target.reset();
                    document.getElementById('imagePreview').style.display = 'none';
                    switchTab('posts');
                    tg.HapticFeedback.notificationOccurred('success');
                } else {
                    throw new Error(result.error);
                }
            } catch (error) {
                showMessage('❌ Ошибка: ' + error.message, 'error');
                tg.HapticFeedback.notificationOccurred('error');
            }
        }

        async function publishPost(day) {
            if (!confirm('Опубликовать этот пост сейчас?')) return;

            try {
                const response = await fetch(`${API_URL}/publish/${day}`, {
                    method: 'POST'
                });

                const result = await response.json();

                if (result.success) {
                    showMessage('✅ Пост опубликован!', 'success');
                    tg.HapticFeedback.notificationOccurred('success');
                } else {
                    throw new Error(result.error);
                }
            } catch (error) {
                showMessage('❌ Ошибка: ' + error.message, 'error');
                tg.HapticFeedback.notificationOccurred('error');
            }
        }

        async function deletePost(day) {
            if (!confirm('Удалить этот пост?')) return;

            try {
                const response = await fetch(`${API_URL}/posts/${day}`, {
                    method: 'DELETE'
                });

                const result = await response.json();

                if (result.success) {
                    showMessage('✅ Пост удален', 'success');
                    loadPosts();
                    tg.HapticFeedback.notificationOccurred('success');
                } else {
                    throw new Error(result.error);
                }
            } catch (error) {
                showMessage('❌ Ошибка: ' + error.message, 'error');
                tg.HapticFeedback.notificationOccurred('error');
            }
        }

        async function testPost() {
            try {
                const API_BOT_URL = 'https://api.telegram.org/bot8042167444:AAEpdAlLRua2Lwc4Cp1Xtp8Z1wzbfGcjOKY';
                const user = tg.initDataUnsafe.user;

                if (!user) {
                    showMessage('Ошибка: не удалось получить данные пользователя', 'error');
                    return;
                }

                await fetch(`${API_BOT_URL}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: user.id,
                        text: '/test'
                    })
                });

                showMessage('✅ Тестовый пост отправлен!', 'success');
                tg.HapticFeedback.notificationOccurred('success');
            } catch (error) {
                showMessage('❌ Ошибка при отправке', 'error');
                tg.HapticFeedback.notificationOccurred('error');
            }
        }

        // Загружаем посты при открытии
        loadPosts();
    </script>
</body>
</html>
